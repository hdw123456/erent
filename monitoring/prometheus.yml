global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:8080

  - job_name: core-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - core-service:8081
