name: CI

on:
  push:
    branches: [develop, main]

  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven verification
        run: mvn --batch-mode clean verify

  docker-build:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    name: Deploy production
    needs: [test, docker-build]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    timeout-minutes: 30

    environment:
      name: erent
      url: http://106.53.192.153:8088/api/health

    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -eu
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY}"
          : "${SSH_KNOWN_HOSTS:?Missing SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%b\n' "$SSH_PRIVATE_KEY" \
            | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null < /dev/null
          printf '%b\n' "$SSH_KNOWN_HOSTS" \
            | tr -d '\r' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          : "${SSH_HOST:?Missing SSH_HOST}"
          : "${SSH_USER:?Missing SSH_USER}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH}"
          : "${IMAGE_TAG:?Missing IMAGE_TAG}"
          : "${GHCR_USERNAME:?Missing GHCR_USERNAME}"
          : "${GHCR_TOKEN:?Missing GHCR_TOKEN}"

          printf '%s' "$GHCR_TOKEN" |
            ssh \
              -i ~/.ssh/id_ed25519 \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" "
            set -eu
            DOCKER_CONFIG=\$(mktemp -d)
            export DOCKER_CONFIG
            trap 'rm -rf \"\$DOCKER_CONFIG\"' EXIT
            docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin

            cd '$DEPLOY_PATH'
            git checkout main
            git -c core.sshCommand='ssh -i /home/deploy/.ssh/erent_github -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes' pull --ff-only origin main
            export IMAGE_TAG='$IMAGE_TAG'

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              config --quiet

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull app

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-build --remove-orphans

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps

            curl -fsS \
              --retry 12 \
              --retry-delay 5 \
              --retry-all-errors \
              http://127.0.0.1:8088/api/health || {
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  logs --tail=100 app nginx
                exit 1
              }
          "
