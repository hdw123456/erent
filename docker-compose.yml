services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-gateway:local
    container_name: ai-gateway-app
    environment:
      SERVER_PORT: "8080"

      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ai_gateway
      DB_USERNAME: ai_gateway
      DB_PASSWORD: ${DB_PASSWORD:-ai_gateway_dev}

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ai_gateway
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ai_gateway_dev}

      # 必须保持稳定，否则以前加密的 Provider Key 无法解密
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:-local-dev-jasypt-password}

      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-AI Gateway Learning}

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: ai-gateway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ai_gateway
      MYSQL_USER: ai_gateway
      MYSQL_PASSWORD: ${DB_PASSWORD:-ai_gateway_dev}

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: ai-gateway-redis

    ports:
      - "6379:6379"

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ai-gateway-rabbitmq
    hostname: rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: ai_gateway
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ai_gateway_dev}

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql-data:
  rabbitmq-data:
