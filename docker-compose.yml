services:
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    image: ai-gateway-gateway-service:local
    container_name: ai-gateway-gateway-service
    environment:
      SERVER_PORT: "8080"
      JAVA_TOOL_OPTIONS: "${GATEWAY_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=20.0}"
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_CONFIG_GROUP: AI_GATEWAY
      NACOS_CONFIG_ENABLED: "true"
      NACOS_DISCOVERY_ENABLED: "true"
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_ADMIN_PASSWORD:-nacos-local-admin-change-me}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      core-service:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health/readiness" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 384m
    restart: unless-stopped

  core-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    image: ai-gateway-core-service:local
    container_name: ai-gateway-core-service
    environment:
      SERVER_PORT: "8081"
      JAVA_TOOL_OPTIONS: "${CORE_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=20.0}"

      NACOS_SERVER_ADDR: nacos:8848
      NACOS_CONFIG_GROUP: AI_GATEWAY
      NACOS_CONFIG_ENABLED: "true"
      NACOS_DISCOVERY_ENABLED: "true"
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_ADMIN_PASSWORD:-nacos-local-admin-change-me}

      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ai_gateway
      DB_USERNAME: ai_gateway
      DB_PASSWORD: ${DB_PASSWORD:-ai_gateway_dev}

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ai_gateway
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ai_gateway_dev}

      JASYPT_PASSWORD: ${JASYPT_PASSWORD:-local-dev-jasypt-password}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-AI Gateway Learning}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8081/actuator/health/readiness" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    mem_limit: 640m
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v3.2.3-slim
    container_name: ai-gateway-nacos
    hostname: nacos
    environment:
      MODE: standalone
      FUNCTION_MODE: microservice
      PREFER_HOST_MODE: hostname
      JVM_XMS: 192m
      JVM_XMX: 320m
      JVM_XMN: 96m
      JVM_MS: 64m
      JVM_MMS: 128m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_ADMIN_ENABLE: "true"
      NACOS_AUTH_CONSOLE_ENABLE: "true"
      NACOS_AUTH_SYSTEM_TYPE: nacos
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-YWktZ2F0ZXdheS1sb2NhbC1uYWNvcy10b2tlbi1jaGFuZ2UtbWUtMjAyNg==}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-ai-gateway-local-server}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-ai-gateway-local-identity}
      NACOS_CONSOLE_UI_ENABLED: "true"
      TOMCAT_ACCESSLOG_ENABLED: "false"
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
      - "127.0.0.1:18080:8080"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8848/nacos/v3/admin/core/state/readiness >/dev/null || exit 1"
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    mem_limit: 512m
    restart: unless-stopped

  nacos-config-init:
    image: curlimages/curl:8.12.1
    container_name: ai-gateway-nacos-config-init
    entrypoint: [ "/bin/sh", "/deploy/publish-config.sh" ]
    environment:
      NACOS_SERVER_URL: http://nacos:8848/nacos
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_ADMIN_PASSWORD: ${NACOS_ADMIN_PASSWORD:-nacos-local-admin-change-me}
      NACOS_CONFIG_GROUP: AI_GATEWAY
      NACOS_CONFIG_DIR: /deploy/config
    volumes:
      - ./deploy/nacos:/deploy:ro
    depends_on:
      nacos:
        condition: service_healthy
    restart: "no"

  mysql:
    image: mysql:8.4
    container_name: ai-gateway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ai_gateway
      MYSQL_USER: ai_gateway
      MYSQL_PASSWORD: ${DB_PASSWORD:-ai_gateway_dev}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: ai-gateway-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 96m
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ai-gateway-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ai_gateway
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ai_gateway_dev}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 384m
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: ai-gateway-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: ai-gateway-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
    mem_limit: 192m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    container_name: ai-gateway-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    mem_limit: 192m
    restart: unless-stopped

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:
  nacos-data:
  nacos-logs:
