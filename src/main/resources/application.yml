spring:
  application:
    name: ai-gateway
  # MySQL stores identity, provider scheduling, usage, and wallet state.
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_gateway}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    # Redis is used only for the request-rate fixed window.
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:ai_gateway}
    password: ${RABBITMQ_PASSWORD:ai_gateway_dev}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${RABBITMQ_PREFETCH:5}
        concurrency: ${RABBITMQ_CONCURRENCY:1}
        max-concurrency: ${RABBITMQ_MAX_CONCURRENCY:1}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

gateway:
  # Limits are evaluated independently for API key, user, and source IP.
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    fail-open: ${RATE_LIMIT_FAIL_OPEN:true}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    api-key-limit: ${RATE_LIMIT_API_KEY_LIMIT:60}
    user-limit: ${RATE_LIMIT_USER_LIMIT:120}
    ip-limit: ${RATE_LIMIT_IP_LIMIT:300}
  upstream:
    connect-timeout-ms: ${UPSTREAM_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${UPSTREAM_READ_TIMEOUT_MS:60000}
    response-timeout-ms: ${UPSTREAM_RESPONSE_TIMEOUT_MS:65000}
    request-timeout-ms: ${UPSTREAM_REQUEST_TIMEOUT_MS:70000}
  provider-key:
    # Maximum candidate credentials tried before the call fails.
    max-failover-attempts: ${PROVIDER_KEY_MAX_FAILOVER_ATTEMPTS:3}

logging:
  level:
    com.example.aigateway: info
  file:
    name: logs/ai-gateway.log

jasypt:
  encryptor:
    # JASYPT_PASSWORD must be supplied outside local development.
    password: ${JASYPT_PASSWORD}
    algorithm: PBEWITHHMACSHA512ANDAES_256

jwt:
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  access-token-expire-ms: ${JWT_ACCESS_TOKEN_EXPIRE_MS:900000}

providers:
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  openrouter:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${OPENROUTER_API_KEY:}
    http-referer: ${OPENROUTER_HTTP_REFERER:}
    app-title: ${OPENROUTER_APP_TITLE:AI Gateway Learning}
