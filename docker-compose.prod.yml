services:
  gateway-service:
    image: ghcr.io/hdw123456/erent-gateway-service:${IMAGE_TAG:?IMAGE_TAG is required}

  core-service:
    image: ghcr.io/hdw123456/erent-core-service:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:?JASYPT_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

  nacos:
    environment:
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?NACOS_AUTH_TOKEN is required}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?NACOS_AUTH_IDENTITY_KEY is required}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?NACOS_AUTH_IDENTITY_VALUE is required}

  nacos-config-init:
    environment:
      NACOS_ADMIN_PASSWORD: ${NACOS_ADMIN_PASSWORD:?NACOS_ADMIN_PASSWORD is required}

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
