spring:
  application:
    name: gateway-service
  config:
    import:
      - optional:nacos:gateway-service.yml?group=${NACOS_CONFIG_GROUP:AI_GATEWAY}&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        register-enabled: ${NACOS_DISCOVERY_ENABLED:false}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          metrics:
            enabled: true
          httpclient:
            connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:3000}
            response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:75s}
          streaming-media-types:
            - text/event-stream
          routes:
            - id: core-websocket
              uri: lb:ws://core-service
              predicates:
                - Path=/v1/responses,/responses,/backend-api/codex/responses
                - Header=Upgrade,(?i)websocket
            - id: core-http
              uri: lb://core-service
              predicates:
                - Path=/api/**,/v1/**,/chat/**,/responses/**,/backend-api/codex/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.example.aigateway.gateway: info
