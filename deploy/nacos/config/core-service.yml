gateway:
  rate-limit:
    enabled: true
    fail-open: true
    window-seconds: 60
    api-key-limit: 60
    user-limit: 120
    ip-limit: 300
  upstream:
    connect-timeout-ms: 3000
    read-timeout-ms: 60000
    response-timeout-ms: 65000
    request-timeout-ms: 70000
  provider-key:
    max-failover-attempts: 3

management:
  endpoint:
    health:
      show-details: never
